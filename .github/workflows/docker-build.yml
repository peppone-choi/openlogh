name: Build & Push Docker Images

on:
    push:
        branches: [main]
        paths:
            - 'backend/**'
            - 'frontend/**'
            - 'docker-compose.yml'
            - '.github/workflows/docker-build.yml'
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/openlogh

jobs:
    build-gateway:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/setup-buildx-action@v3

            - uses: docker/metadata-action@v5
              id: meta
              with:
                  images: ${{ env.IMAGE_PREFIX }}-gateway
                  tags: |
                      type=sha,prefix=
                      type=raw,value=latest

            - uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  build-args: MODULE=gateway-app
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha,scope=gateway
                  cache-to: type=gha,mode=max,scope=gateway

    build-game:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/setup-buildx-action@v3

            - uses: docker/metadata-action@v5
              id: meta
              with:
                  images: ${{ env.IMAGE_PREFIX }}-game
                  tags: |
                      type=sha,prefix=
                      type=raw,value=latest

            - uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  build-args: MODULE=game-app
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha,scope=game
                  cache-to: type=gha,mode=max,scope=game

    build-frontend:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/setup-buildx-action@v3

            - uses: docker/metadata-action@v5
              id: meta
              with:
                  images: ${{ env.IMAGE_PREFIX }}-frontend
                  tags: |
                      type=sha,prefix=
                      type=raw,value=latest

            - uses: docker/build-push-action@v6
              with:
                  context: ./frontend
                  build-args: |
                      NEXT_PUBLIC_API_URL=/api
                      NEXT_PUBLIC_WS_URL=
                      NEXT_PUBLIC_IMAGE_CDN_BASE=${{ vars.NEXT_PUBLIC_IMAGE_CDN_BASE || 'https://cdn.jsdelivr.net/gh/peppone-choi/openlogh-image@master/' }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha,scope=frontend
                  cache-to: type=gha,mode=max,scope=frontend

    deploy:
        needs: [build-gateway, build-game, build-frontend]
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      cd ~/openlogh-deploy
                      docker compose pull
                      docker compose up -d
